services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    env_file:
      - .env
    environment:
      # Derived from POSTGRES_* so root .env need not duplicate DATABASE_URL for Compose
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Insecure defaults for local Docker only — set JWT_* in .env for real secrets
      JWT_SECRET: ${JWT_SECRET:-local-docker-dev-only-jwt-access-secret-min-32b}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-local-docker-dev-only-jwt-refresh-secret-min-32b}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID:-}
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID:-}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET:-}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:5173}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-3001}
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
    command:
      - sh
      - -lc
      - |
        set -e
        pnpm install
        pnpm --filter @manifest/shared build
        pnpm --filter @manifest/api exec prisma generate
        cd /app/apps/api && pnpm exec prisma migrate deploy
        cd /app
        exec pnpm --filter @manifest/api dev

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - .:/app
      - /app/node_modules
    command:
      - sh
      - -lc
      - |
        set -e
        pnpm install
        pnpm --filter @manifest/shared build
        exec pnpm --filter @manifest/web dev

volumes:
  postgres_data:
